- id: '1631318144171'
  alias: Lights - On arrival / transition sunset
  description: Dim in the lights at sunset or at full brightness if arriving after
    sunset
  trigger:
  - platform: sun
    event: sunset
    offset: -00:45:00
  - platform: state
    entity_id: sensor.house_status
    from: Vacant
    to: Occupied
  condition:
  - condition: state
    entity_id: sensor.house_status
    state: Occupied
  action:
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ trigger.platform == ''sun'' }}'
      sequence:
      - service: light.turn_on
        data:
          color_temp: 287
          brightness_pct: 100
          effect: none
          transition: 900
        target:
          entity_id: light.lamp, light.bookshelf
      - service: light.turn_on
        data:
          white: 255
          effect: none
          transition: 900
        target:
          entity_id: light.lamp_sofia, light.lamp_joseph
    - conditions:
      - condition: state
        entity_id: sun.sun
        state: below_horizon
      sequence:
      - service: light.turn_on
        data:
          entity_id: light.lamp, light.bookshelf
          color_temp: 287
          brightness_pct: 100
          effect: none
      - service: light.turn_on
        data:
          entity_id: light.lamp_sofia, light.lamp_joseph
          white: 255
          effect: none
    default:
  mode: single
- id: '1631361844123'
  alias: Lights - Off when gone to bed
  description: ''
  trigger:
  - platform: template
    value_template: '{{ states.binary_sensor | selectattr("attributes.device_class",
      "eq","motion") | map(attribute="state") | select("eq", "on") | list | length
      | int > 0 }}'
  condition:
  - condition: state
    entity_id: binary_sensor.motion_master
    state: 'on'
  - condition: time
    after: '20:30:00'
    before: 09:00:00
  - condition: state
    entity_id: sun.sun
    state: below_horizon
  - condition: template
    value_template: '{{ is_state("light.lamp", "on") or is_state("light.bookshelf",
      "on") }}'
  - condition: state
    entity_id:
    - binary_sensor.livingroom_tv
    - binary_sensor.frontroom_tv
    - group.computers
    state: 'off'
  action:
  - wait_for_trigger:
    - platform: template
      value_template: '{{ states.binary_sensor | selectattr("attributes.device_class",
        "eq", "motion") | map(attribute="state") | select("eq", "on") | list | length
        | int == 0 }}'
      for: 00:10:00
    timeout: 02:30:00
  - service: light.turn_off
    data:
      transition: 30
    target:
      entity_id:
      - light.bookshelf
      - light.lamp
  mode: restart
